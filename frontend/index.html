<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elias Console</title>

  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/live2d.css">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
</head>
<body>
  <!-- ======== Login View ======== -->
  <div id="login-view" class="login-container">
    <div class="login-card card">
      <div class="card-body">
        <div class="login-title">Elias Console</div>
        <div class="login-subtitle">用 Discord 登录以访问控制台</div>
        <a href="/auth/login" class="btn-discord" style="display:inline-block;text-decoration:none;">
          Login with Discord
        </a>
      </div>
    </div>
  </div>

  <!-- ======== App View (hidden until auth) ======== -->
  <div id="app-view" class="app-layout hidden">
    <!-- Mobile menu button (hidden on desktop) -->
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">☰</button>
    <!-- Sidebar backdrop overlay (mobile only) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <button class="sidebar-toggle" id="sidebar-toggle" title="折叠侧边栏">◀</button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-section-label">Persona</div>
      <div class="persona-list" id="persona-list"></div>
      <div class="sidebar-user">
        <img class="sidebar-avatar" id="sidebar-avatar" src="" alt="">
        <span id="sidebar-username"></span>
        <button class="btn-logout" id="btn-logout">退出</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content"></main>
  </div>

  <!-- Error view (auth failed) -->
  <div id="error-view" class="login-container hidden">
    <div class="login-card card">
      <div class="card-body">
        <div class="login-title">登录失败</div>
        <div class="login-subtitle" id="error-msg"></div>
        <a href="/auth/login" class="btn-discord" style="display:inline-block;text-decoration:none;">重新登录</a>
      </div>
    </div>
  </div>

  <!-- Three.js import map — resolves bare "three" and "three/addons/" for model renderers -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="/js/api.js"></script>
  <script type="module" src="/js/home.js"></script>
  <script type="module" src="/js/app.js?v=2"></script>
</body>
</html>
