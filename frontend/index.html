<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elias Console</title>

  <link rel="stylesheet" href="/css/main.css?v=1">
  <link rel="stylesheet" href="/css/home.css?v=1">
  <link rel="stylesheet" href="/css/live2d.css?v=1">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
</head>
<body>
  <!-- ======== Login View ======== -->
  <div id="login-view" class="login-container">
    <div class="login-card card">
      <div class="card-body">
        <div class="login-title">Elias Console</div>
        <div class="login-subtitle">用 Discord 登录以访问控制台</div>
        <a href="/auth/login" class="btn-discord" style="display:inline-block;text-decoration:none;">
          Login with Discord
        </a>
      </div>
    </div>
  </div>

  <!-- ======== App View (hidden until auth) ======== -->
  <div id="app-view" class="app-layout hidden">
    <!-- Mobile menu button (hidden on desktop) -->
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">☰</button>
    <!-- Sidebar backdrop overlay (mobile only) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <button class="sidebar-toggle" id="sidebar-toggle" title="折叠侧边栏">◀</button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-section-label">Persona</div>
      <div class="persona-list" id="persona-list"></div>
      <div class="sidebar-user">
        <img class="sidebar-avatar" id="sidebar-avatar" src="" alt="">
        <span id="sidebar-username"></span>
        <button class="btn-logout" id="btn-logout">退出</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content"></main>
  </div>

  <!-- Error view (auth failed) -->
  <div id="error-view" class="login-container hidden">
    <div class="login-card card">
      <div class="card-body">
        <div class="login-title">登录失败</div>
        <div class="login-subtitle" id="error-msg"></div>
        <a href="/auth/login" class="btn-discord" style="display:inline-block;text-decoration:none;">重新登录</a>
      </div>
    </div>
  </div>

  <!-- Inline auth check — bypasses module system to ensure auth always works -->
  <script>
  fetch("/auth/me", { credentials: "include" })
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(user => {
      document.getElementById("login-view").classList.add("hidden");
      document.getElementById("app-view").classList.remove("hidden");
      document.getElementById("sidebar-username").textContent = user.username;
      if (user.avatar) {
        document.getElementById("sidebar-avatar").src =
          "https://cdn.discordapp.com/avatars/" + user.id + "/" + user.avatar + ".png?size=64";
      }
      document.getElementById("btn-logout").addEventListener("click", function() {
        window.location.href = "/auth/logout";
      });
      // Also generate an API token so the module-based API calls work
      return fetch("/auth/token", { method: "POST", credentials: "include" })
        .then(r => r.json())
        .then(data => { if (data.token) localStorage.setItem("elias-auth-token", data.token); })
        .catch(() => {});
    })
    .catch(() => {});
  </script>

  <!-- Ammo.js physics engine — required by Three.js MMDPhysics for cloth/hair simulation -->
  <script src="/js/vendor/ammo.js"></script>

  <!-- Three.js import map — resolves bare "three" and "three/addons/" for model renderers -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="/js/api.js?v=1"></script>
  <script type="module" src="/js/home.js?v=1"></script>
  <script type="module" src="/js/app.js?v=9"></script>
</body>
</html>
